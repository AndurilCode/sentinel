# ─────────────────────────────────────────────────────────────
# Rule: no-hardcoded-secrets
# Trigger: file_write
# Catches hardcoded credentials, API keys, and tokens.
# ─────────────────────────────────────────────────────────────

id: no-hardcoded-secrets
trigger: file_write
severity: block
# Semantic content analysis — larger model for fewer false positives
model: "gemma3:12b"

# Broad scope — secrets can leak into any file
scope:
  - "**/*.ts"
  - "**/*.js"
  - "**/*.py"
  - "**/*.go"
  - "**/*.java"
  - "**/*.yaml"
  - "**/*.yml"
  - "**/*.json"
  - "**/*.env"
  - "**/*.toml"
  - "**/*.cfg"
  - "**/*.conf"

exclude:
  - "**/*.test.*"
  - "**/*.spec.*"
  - "**/*.example.*"
  - "**/.env.example"
  - "**/node_modules/**"
  - "**/package-lock.json"

prompt: |
  A coding agent is writing to:
  FILE: {{file_path}}

  CONTENT PREVIEW (first 800 chars):
  {{content_snippet}}

  RULE: Code must never contain hardcoded secrets, API keys,
  passwords, tokens, or connection strings with credentials.
  Environment variable references (process.env.*, os.environ,
  ${VAR}) and placeholder values ("your-key-here", "xxx", "TODO")
  are acceptable.

  Does this content appear to contain a real hardcoded secret?
  Respond ONLY with JSON: {"violation": true/false, "confidence": 0.0-1.0, "reason": "one line"}
