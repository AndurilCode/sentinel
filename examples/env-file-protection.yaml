# ─────────────────────────────────────────────────────────────
# Rule: env-file-protection
# Trigger: file_write
# Blocks writes to .env files that contain actual secret values.
# ─────────────────────────────────────────────────────────────

id: env-file-protection
trigger: file_write
severity: block

scope:
  - "**/.env"
  - "**/.env.local"
  - "**/.env.production"
  - "**/.env.staging"
  - "**/.env.development"

exclude:
  - "**/.env.example"
  - "**/.env.template"
  - "**/.env.sample"

prompt: |
  A coding agent is writing to:
  FILE: {{file_path}}

  CONTENT PREVIEW (first 800 chars):
  {{content_snippet}}

  RULE: Environment files (.env) must not be written with real secret
  values. Placeholder values ("changeme", "your-api-key-here", "xxx",
  empty values) are acceptable. Real-looking API keys, tokens, passwords,
  or connection strings with credentials are not. This prevents secrets
  from being committed to version control.

  Does this .env file contain what appear to be real secret values?
  Respond ONLY with JSON: {"violation": true/false, "confidence": 0.0-1.0, "reason": "one line"}
