id: version-bump-reminder
trigger: file_write
severity: warn
scope:
  - "sentinel.py"
  - "sentinel_context.py"
  - "sentinel_lock.py"
  - "hooks/hooks.json"
  - "skills/**"
exclude:
  - "test_*"
  - "docs/**"
  - "examples/**"
prompt: |
  FILE: {{file_path}}

  These files ship with the Sentinel Claude Code plugin.
  Any change is a releasable change requiring a version bump.

  NOT a violation if the file is .claude-plugin/plugin.json
  or .claude-plugin/marketplace.json (that IS the bump).

  Is this a releasable plugin file being modified?
  Respond ONLY with JSON: {"violation": true/false, "confidence": 0.0-1.0, "reason": "MUST DO: bump version in .claude-plugin/plugin.json and .claude-plugin/marketplace.json since it is a releasable change in claude plugin"}
